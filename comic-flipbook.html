<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flip Comics</title>
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Comic+Neue:wght@400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ink: #1a1a2e;
    --yellow: #FFD700;
    --red: #E63946;
    --blue: #457B9D;
    --paper: #FFF8E7;
    --panel-bg: #F0E6CC;
    --shadow: 4px 4px 0px #1a1a2e;
  }

  body {
    font-family: 'Comic Neue', cursive;
    background-color: var(--ink);
    background-image:
      radial-gradient(circle, rgba(255,255,255,0.04) 1px, transparent 1px);
    background-size: 24px 24px;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ===== PAGES ===== */
  .page { display: none; min-height: 100vh; }
  .page.active { display: block; }

  /* ===== GALLERY PAGE ===== */
  #gallery-page {
    padding: 40px 20px 60px;
  }

  .site-header {
    text-align: center;
    margin-bottom: 50px;
  }

  .site-header h1 {
    font-family: 'Bangers', cursive;
    font-size: clamp(3rem, 10vw, 7rem);
    color: var(--yellow);
    letter-spacing: 4px;
    text-shadow:
      4px 4px 0 var(--red),
      8px 8px 0 var(--ink);
    line-height: 1;
    -webkit-text-stroke: 2px var(--ink);
  }

  .site-header .tagline {
    font-family: 'Comic Neue', cursive;
    font-size: 1.1rem;
    color: var(--paper);
    margin-top: 10px;
    opacity: 0.8;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .zigzag-divider {
    width: 100%;
    max-width: 600px;
    margin: 20px auto;
    height: 20px;
    background:
      linear-gradient(135deg, var(--yellow) 25%, transparent 25%) -10px 0,
      linear-gradient(225deg, var(--yellow) 25%, transparent 25%) -10px 0,
      linear-gradient(315deg, var(--yellow) 25%, transparent 25%),
      linear-gradient(45deg, var(--yellow) 25%, transparent 25%);
    background-size: 20px 20px;
    background-color: transparent;
  }

  .comics-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 30px;
    justify-content: center;
    max-width: 1100px;
    margin: 0 auto;
  }

  .comic-card {
    background: var(--paper);
    border: 4px solid var(--ink);
    border-radius: 8px;
    width: 240px;
    cursor: pointer;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
    box-shadow: var(--shadow);
    position: relative;
    overflow: hidden;
  }

  .comic-card:hover {
    transform: translate(-4px, -4px);
    box-shadow: 8px 8px 0px var(--ink);
  }

  .comic-card:active {
    transform: translate(0,0);
    box-shadow: var(--shadow);
  }

  .comic-card .card-cover {
    width: 100%;
    height: 300px;
    background: var(--panel-bg);
    border-bottom: 4px solid var(--ink);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }

  /* SVG cover art for One Fish */
  .cover-onefish {
    background: linear-gradient(160deg, #a8d8ea 0%, #e8f4f8 60%, #c9e9f6 100%);
  }

  .card-info {
    padding: 14px 16px 16px;
  }

  .card-info .comic-title {
    font-family: 'Bangers', cursive;
    font-size: 1.6rem;
    color: var(--ink);
    letter-spacing: 2px;
    line-height: 1.1;
  }

  .card-info .comic-meta {
    font-size: 0.78rem;
    color: #666;
    margin-top: 4px;
  }

  .card-info .read-btn {
    margin-top: 12px;
    display: inline-block;
    background: var(--red);
    color: white;
    font-family: 'Bangers', cursive;
    font-size: 1.1rem;
    letter-spacing: 1px;
    padding: 6px 18px;
    border: 3px solid var(--ink);
    border-radius: 4px;
    box-shadow: 3px 3px 0 var(--ink);
    transition: transform 0.1s, box-shadow 0.1s;
  }

  .comic-card:hover .read-btn {
    transform: translate(-2px,-2px);
    box-shadow: 5px 5px 0 var(--ink);
  }

  .new-badge {
    position: absolute;
    top: 12px;
    right: -28px;
    background: var(--red);
    color: white;
    font-family: 'Bangers', cursive;
    font-size: 0.9rem;
    letter-spacing: 1px;
    padding: 4px 36px;
    transform: rotate(35deg);
    border-top: 2px solid var(--ink);
    border-bottom: 2px solid var(--ink);
  }

  .add-card {
    background: transparent;
    border: 4px dashed rgba(255,215,0,0.4);
    border-radius: 8px;
    width: 240px;
    height: 398px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: rgba(255,215,0,0.4);
    cursor: default;
    gap: 12px;
  }

  .add-card .plus { font-size: 3rem; }
  .add-card span { font-family: 'Bangers', cursive; font-size: 1.2rem; letter-spacing: 1px; }

  /* ===== FLIPBOOK PAGE ===== */
  #flipbook-page {
    min-height: 100vh;
    padding: 30px 20px 60px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .flipbook-header {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 30px;
    width: 100%;
    max-width: 800px;
  }

  .back-btn {
    font-family: 'Bangers', cursive;
    font-size: 1.1rem;
    letter-spacing: 1px;
    background: var(--yellow);
    color: var(--ink);
    border: 3px solid var(--ink);
    border-radius: 4px;
    box-shadow: 3px 3px 0 var(--ink);
    padding: 6px 16px;
    cursor: pointer;
    transition: transform 0.1s, box-shadow 0.1s;
    white-space: nowrap;
  }

  .back-btn:hover {
    transform: translate(-2px,-2px);
    box-shadow: 5px 5px 0 var(--ink);
  }

  .flipbook-title {
    font-family: 'Bangers', cursive;
    font-size: clamp(2rem, 6vw, 3.5rem);
    color: var(--yellow);
    letter-spacing: 3px;
    text-shadow: 3px 3px 0 var(--red), 5px 5px 0 var(--ink);
    -webkit-text-stroke: 1.5px var(--ink);
  }

  /* ===== BOOK CONTAINER ===== */
  .book-container {
    perspective: 1800px;
    width: min(720px, 95vw);
    display: flex;
    justify-content: center;
    margin-bottom: 28px;
  }

  .book {
    width: 100%;
    max-width: 700px;
    position: relative;
    display: flex;
    justify-content: center;
  }

  /* Two-page spread */
  .spread {
    display: flex;
    width: 100%;
    border: 4px solid var(--ink);
    border-radius: 4px 12px 12px 4px;
    box-shadow: 8px 8px 0 var(--ink), 0 20px 60px rgba(0,0,0,0.6);
    overflow: hidden;
    background: var(--paper);
    min-height: 460px;
    position: relative;
  }

  .page-left, .page-right {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }

  .page-left {
    border-right: 3px solid rgba(0,0,0,0.15);
    background: linear-gradient(to right, #e8dfc8 0%, var(--paper) 100%);
  }

  .page-right {
    background: linear-gradient(to left, #e8dfc8 0%, var(--paper) 100%);
  }

  /* Spine shadow */
  .spread::after {
    content: '';
    position: absolute;
    left: 50%;
    top: 0; bottom: 0;
    width: 10px;
    transform: translateX(-50%);
    background: linear-gradient(to right,
      rgba(0,0,0,0.12),
      rgba(0,0,0,0.05) 30%,
      rgba(255,255,255,0.1) 50%,
      rgba(0,0,0,0.05) 70%,
      rgba(0,0,0,0.12));
    pointer-events: none;
    z-index: 10;
  }

  /* Page content panels */
  .comic-page {
    width: 100%;
    height: 100%;
    min-height: 460px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    padding: 16px;
  }

  .panel {
    border: 3px solid var(--ink);
    border-radius: 3px;
    background: var(--panel-bg);
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  .panel svg { width: 100%; height: 100%; }

  .panel-caption {
    position: absolute;
    bottom: 6px;
    left: 6px;
    right: 6px;
    background: white;
    border: 2px solid var(--ink);
    border-radius: 3px;
    font-family: 'Comic Neue', cursive;
    font-size: clamp(0.62rem, 1.5vw, 0.78rem);
    font-weight: 700;
    padding: 3px 6px;
    text-align: center;
    line-height: 1.3;
  }

  .speech-bubble {
    position: absolute;
    background: white;
    border: 2.5px solid var(--ink);
    border-radius: 16px;
    padding: 5px 10px;
    font-family: 'Comic Neue', cursive;
    font-size: clamp(0.55rem, 1.3vw, 0.72rem);
    font-weight: 700;
    max-width: 55%;
    text-align: center;
    line-height: 1.3;
    z-index: 2;
  }

  .speech-bubble::after {
    content: '';
    position: absolute;
    bottom: -12px;
    left: 50%;
    transform: translateX(-50%);
    border: 6px solid transparent;
    border-top-color: var(--ink);
  }
  .speech-bubble::before {
    content: '';
    position: absolute;
    bottom: -8px;
    left: 50%;
    transform: translateX(-50%);
    border: 5px solid transparent;
    border-top-color: white;
    z-index: 1;
  }

  .page-number {
    position: absolute;
    bottom: 6px;
    font-family: 'Bangers', cursive;
    font-size: 0.85rem;
    color: var(--ink);
    opacity: 0.5;
    letter-spacing: 1px;
  }
  .page-left .page-number { left: 10px; }
  .page-right .page-number { right: 10px; }

  /* Cover styles */
  .cover-panel {
    background: linear-gradient(160deg, #a8d8ea 0%, #e8f4f8 60%, #b5e0f5 100%);
    border: none;
    flex: 1;
  }

  /* Flip animation */
  .spread.flip-left {
    animation: flipLeft 0.5s ease-in-out;
  }
  .spread.flip-right {
    animation: flipRight 0.5s ease-in-out;
  }

  @keyframes flipLeft {
    0% { transform: rotateY(0deg); }
    50% { transform: rotateY(-10deg); opacity: 0.7; }
    100% { transform: rotateY(0deg); }
  }
  @keyframes flipRight {
    0% { transform: rotateY(0deg); }
    50% { transform: rotateY(10deg); opacity: 0.7; }
    100% { transform: rotateY(0deg); }
  }

  /* ===== CONTROLS ===== */
  .controls {
    display: flex;
    align-items: center;
    gap: 20px;
    margin-top: 10px;
  }

  .ctrl-btn {
    font-family: 'Bangers', cursive;
    font-size: 1.3rem;
    letter-spacing: 1px;
    background: var(--yellow);
    color: var(--ink);
    border: 3px solid var(--ink);
    border-radius: 6px;
    box-shadow: 3px 3px 0 var(--ink);
    padding: 8px 22px;
    cursor: pointer;
    transition: transform 0.1s, box-shadow 0.1s, opacity 0.2s;
    user-select: none;
  }

  .ctrl-btn:hover:not(:disabled) {
    transform: translate(-2px,-2px);
    box-shadow: 5px 5px 0 var(--ink);
  }

  .ctrl-btn:active:not(:disabled) {
    transform: translate(1px,1px);
    box-shadow: 2px 2px 0 var(--ink);
  }

  .ctrl-btn:disabled {
    opacity: 0.35;
    cursor: default;
    box-shadow: 2px 2px 0 var(--ink);
  }

  .page-indicator {
    font-family: 'Bangers', cursive;
    font-size: 1.2rem;
    color: var(--paper);
    letter-spacing: 2px;
    min-width: 110px;
    text-align: center;
  }

  .keyboard-hint {
    color: rgba(255,255,255,0.35);
    font-size: 0.72rem;
    margin-top: 10px;
    letter-spacing: 1px;
  }

  @media (max-width: 520px) {
    .spread { min-height: 320px; }
    .comic-page { padding: 8px; gap: 5px; }
    .ctrl-btn { padding: 7px 14px; font-size: 1.1rem; }
  }
</style>
</head>
<body>

<!-- ===== GALLERY PAGE ===== -->
<div id="gallery-page" class="page active">
  <header class="site-header">
    <h1>FLIP COMICS</h1>
    <p class="tagline">Your Comics, Brought to Life</p>
    <div class="zigzag-divider"></div>
  </header>

  <div class="comics-grid">

    <!-- ONE FISH card -->
    <div class="comic-card" onclick="openComic('onefish')">
      <div class="card-cover cover-onefish">
        <span class="new-badge">NEW!</span>
        <!-- Cover SVG art -->
        <svg viewBox="0 0 240 300" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:100%;">
          <!-- Water ripples bg -->
          <ellipse cx="120" cy="260" rx="110" ry="18" fill="rgba(69,123,157,0.18)"/>
          <ellipse cx="120" cy="260" rx="80" ry="10" fill="rgba(69,123,157,0.12)"/>

          <!-- Title banner -->
          <rect x="10" y="20" width="220" height="52" fill="#FFD700" rx="4"
            stroke="#1a1a2e" stroke-width="3"/>
          <text x="120" y="55" text-anchor="middle"
            font-family="Bangers,cursive" font-size="34" fill="#1a1a2e"
            letter-spacing="3">ONE FISH</text>

          <!-- Big cute fish body -->
          <ellipse cx="120" cy="175" rx="72" ry="52" fill="#E63946" stroke="#1a1a2e" stroke-width="3"/>
          <!-- Tail -->
          <polygon points="185,175 215,148 215,202" fill="#c1121f" stroke="#1a1a2e" stroke-width="3"/>
          <!-- Fish eye -->
          <circle cx="80" cy="162" r="14" fill="white" stroke="#1a1a2e" stroke-width="2.5"/>
          <circle cx="78" cy="160" r="7" fill="#1a1a2e"/>
          <circle cx="75" cy="157" r="2.5" fill="white"/>
          <!-- Smile -->
          <path d="M 68 178 Q 72 188 80 185" fill="none" stroke="#1a1a2e" stroke-width="2.5" stroke-linecap="round"/>
          <!-- Fin -->
          <ellipse cx="120" cy="132" rx="30" ry="14" fill="#c1121f" stroke="#1a1a2e" stroke-width="2.5" transform="rotate(-15 120 132)"/>
          <!-- Scales -->
          <path d="M 110 175 Q 120 165 130 175" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="2"/>
          <path d="M 120 185 Q 130 175 140 185" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="2"/>
          <path d="M 100 185 Q 110 175 120 185" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="2"/>

          <!-- Bubbles -->
          <circle cx="65" cy="140" r="6" fill="none" stroke="#457B9D" stroke-width="2"/>
          <circle cx="55" cy="122" r="4" fill="none" stroke="#457B9D" stroke-width="1.5"/>
          <circle cx="70" cy="108" r="3" fill="none" stroke="#457B9D" stroke-width="1.5"/>

          <!-- Subtitle -->
          <rect x="30" y="238" width="180" height="26" fill="#1a1a2e" rx="3"/>
          <text x="120" y="256" text-anchor="middle"
            font-family="Bangers,cursive" font-size="14" fill="#FFD700"
            letter-spacing="2">A COMIC ADVENTURE</text>
        </svg>
      </div>
      <div class="card-info">
        <div class="comic-title">One Fish</div>
        <div class="comic-meta">6 pages · Adventure · All Ages</div>
        <div class="read-btn">READ NOW ▶</div>
      </div>
    </div>

    <!-- Placeholder future comic -->
    <div class="add-card">
      <div class="plus">＋</div>
      <span>More Comics<br>Coming Soon</span>
    </div>

  </div>
</div>

<!-- ===== FLIPBOOK PAGE ===== -->
<div id="flipbook-page" class="page">
  <div class="flipbook-header">
    <button class="back-btn" onclick="goBack()">← BACK</button>
    <div class="flipbook-title" id="flipbook-title">ONE FISH</div>
  </div>

  <div class="book-container">
    <div class="book">
      <div class="spread" id="spread">
        <div class="page-left" id="page-left"></div>
        <div class="page-right" id="page-right"></div>
      </div>
    </div>
  </div>

  <div class="controls">
    <button class="ctrl-btn" id="prev-btn" onclick="prevPage()" disabled>◀ PREV</button>
    <div class="page-indicator" id="page-indicator">COVER</div>
    <button class="ctrl-btn" id="next-btn" onclick="nextPage()">NEXT ▶</button>
  </div>
  <div class="keyboard-hint">← → arrow keys or swipe to flip</div>
</div>

<script>
// ===== COMIC DATA: One Fish =====
// Each spread has a left page and right page. Index 0 = cover spread.
const oneFishPages = [
  // 0: Cover + inside front
  {
    left: 'cover',
    right: 'inside-front',
  },
  // 1: Pages 1–2
  {
    left: 'page1',
    right: 'page2',
  },
  // 2: Pages 3–4
  {
    left: 'page3',
    right: 'page4',
  },
  // 3: Pages 5–6 (end)
  {
    left: 'page5',
    right: 'back-cover',
  },
];

let currentSpread = 0;
const totalSpreads = oneFishPages.length;

// ===== PAGE RENDERERS =====
function renderPage(type, container) {
  container.innerHTML = '';

  const renderers = {
    'cover': renderCover,
    'inside-front': renderInsideFront,
    'page1': renderPage1,
    'page2': renderPage2,
    'page3': renderPage3,
    'page4': renderPage4,
    'page5': renderPage5,
    'back-cover': renderBackCover,
  };

  if (renderers[type]) renderers[type](container);
}

function makePanel(innerHTML, caption) {
  const p = document.createElement('div');
  p.className = 'panel';
  p.innerHTML = innerHTML;
  if (caption) {
    const c = document.createElement('div');
    c.className = 'panel-caption';
    c.textContent = caption;
    p.appendChild(c);
  }
  return p;
}

function makeBubble(text, top, left, right) {
  const b = document.createElement('div');
  b.className = 'speech-bubble';
  b.textContent = text;
  b.style.top = top;
  if (left !== undefined) b.style.left = left;
  if (right !== undefined) b.style.right = right;
  return b;
}

// -- COVER --
function renderCover(c) {
  c.style.background = 'linear-gradient(160deg, #a8d8ea 0%, #e8f4f8 60%, #b5e0f5 100%)';
  c.innerHTML = `
    <svg viewBox="0 0 320 460" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:100%">
      <rect width="320" height="460" fill="url(#coverGrad)"/>
      <defs>
        <linearGradient id="coverGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#a8d8ea"/>
          <stop offset="100%" stop-color="#c9e9f6"/>
        </linearGradient>
      </defs>
      <!-- Water lines -->
      <path d="M0 340 Q 80 320 160 340 Q 240 360 320 340 L320 460 L0 460Z" fill="rgba(69,123,157,0.25)"/>
      <path d="M0 360 Q 80 340 160 360 Q 240 380 320 360 L320 460 L0 460Z" fill="rgba(69,123,157,0.18)"/>

      <!-- Title box -->
      <rect x="20" y="28" width="280" height="68" fill="#FFD700" rx="5" stroke="#1a1a2e" stroke-width="3.5"/>
      <text x="160" y="72" text-anchor="middle" font-family="Bangers,cursive" font-size="52"
        fill="#1a1a2e" letter-spacing="4">ONE FISH</text>

      <!-- Big fish -->
      <ellipse cx="160" cy="250" rx="100" ry="74" fill="#E63946" stroke="#1a1a2e" stroke-width="3.5"/>
      <polygon points="248,250 290,215 290,285" fill="#c1121f" stroke="#1a1a2e" stroke-width="3.5"/>
      <circle cx="105" cy="232" r="20" fill="white" stroke="#1a1a2e" stroke-width="3"/>
      <circle cx="102" cy="229" r="10" fill="#1a1a2e"/>
      <circle cx="98" cy="225" r="3.5" fill="white"/>
      <path d="M 90 255 Q 96 268 108 263" fill="none" stroke="#1a1a2e" stroke-width="3" stroke-linecap="round"/>
      <ellipse cx="160" cy="195" rx="38" ry="18" fill="#c1121f" stroke="#1a1a2e" stroke-width="3" transform="rotate(-12 160 195)"/>
      <path d="M148,250 Q160,236 172,250" fill="none" stroke="rgba(255,255,255,0.45)" stroke-width="2.5"/>
      <path d="M162,264 Q174,250 186,264" fill="none" stroke="rgba(255,255,255,0.45)" stroke-width="2.5"/>
      <path d="M130,264 Q142,250 154,264" fill="none" stroke="rgba(255,255,255,0.45)" stroke-width="2.5"/>

      <!-- Bubbles -->
      <circle cx="82" cy="205" r="9" fill="none" stroke="#457B9D" stroke-width="2.5"/>
      <circle cx="68" cy="183" r="6" fill="none" stroke="#457B9D" stroke-width="2"/>
      <circle cx="78" cy="162" r="4.5" fill="none" stroke="#457B9D" stroke-width="1.5"/>

      <!-- Subtitle -->
      <rect x="40" y="350" width="240" height="34" fill="#1a1a2e" rx="4"/>
      <text x="160" y="373" text-anchor="middle" font-family="Bangers,cursive" font-size="18"
        fill="#FFD700" letter-spacing="3">A COMIC ADVENTURE</text>

      <!-- Author line -->
      <text x="160" y="430" text-anchor="middle" font-family="Comic Neue,cursive" font-size="13"
        fill="#1a1a2e" font-weight="bold">By [Your Name]</text>
    </svg>
  `;
}

// -- INSIDE FRONT --
function renderInsideFront(c) {
  const page = document.createElement('div');
  page.className = 'comic-page';
  page.style.justifyContent = 'center';
  page.style.alignItems = 'center';
  page.style.gap = '0';

  // Single tall intro panel
  const p = document.createElement('div');
  p.className = 'panel';
  p.style.flex = '1';
  p.innerHTML = `
    <svg viewBox="0 0 280 400" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:100%;display:block">
      <defs>
        <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#fff8e7"/>
          <stop offset="100%" stop-color="#d0effa"/>
        </linearGradient>
      </defs>

// ===== NAVIGATION =====
function openComic(id) {
  currentSpread = 0;
  document.getElementById('gallery-page').classList.remove('active');
  document.getElementById('flipbook-page').classList.add('active');
  renderSpread();
  updateControls();
}

function goBack() {
  document.getElementById('flipbook-page').classList.remove('active');
  document.getElementById('gallery-page').classList.add('active');
}

function renderSpread(direction) {
  const spread = document.getElementById('spread');
  const leftEl = document.getElementById('page-left');
  const rightEl = document.getElementById('page-right');

  // Animate
  if (direction) {
    spread.classList.remove('flip-left','flip-right');
    void spread.offsetWidth;
    spread.classList.add(direction === 'next' ? 'flip-right' : 'flip-left');
    setTimeout(() => spread.classList.remove('flip-left','flip-right'), 500);
  }

  leftEl.innerHTML = '';
  rightEl.innerHTML = '';
  leftEl.style.background = '';
  rightEl.style.background = '';

  const data = oneFishPages[currentSpread];
  renderPage(data.left, leftEl);
  renderPage(data.right, rightEl);
}

function nextPage() {
  if (currentSpread < totalSpreads - 1) {
    currentSpread++;
    renderSpread('next');
    updateControls();
  }
}

function prevPage() {
  if (currentSpread > 0) {
    currentSpread--;
    renderSpread('prev');
    updateControls();
  }
}

function updateControls() {
  document.getElementById('prev-btn').disabled = currentSpread === 0;
  document.getElementById('next-btn').disabled = currentSpread === totalSpreads - 1;

  const labels = ['COVER', 'PP. 1–2', 'PP. 3–4', 'PP. 5–6'];
  document.getElementById('page-indicator').textContent = labels[currentSpread] || `SPREAD ${currentSpread+1}`;
}

// Keyboard nav
document.addEventListener('keydown', (e) => {
  if (!document.getElementById('flipbook-page').classList.contains('active')) return;
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') nextPage();
  if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') prevPage();
});

// Touch/swipe
let touchStartX = 0;
document.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; }, {passive:true});
document.addEventListener('touchend', e => {
  if (!document.getElementById('flipbook-page').classList.contains('active')) return;
  const dx = e.changedTouches[0].clientX - touchStartX;
  if (Math.abs(dx) > 50) dx < 0 ? nextPage() : prevPage();
}, {passive:true});
</script>
