<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RoninComics</title>
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Comic+Neue:wght@400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ink: #1a1a2e;
    --yellow: #FFD700;
    --red: #E63946;
    --blue: #457B9D;
    --paper: #FFF8E7;
    --panel-bg: #F0E6CC;
    --shadow: 4px 4px 0px #1a1a2e;
  }

  body {
    font-family: 'Comic Neue', cursive;
    background-color: var(--ink);
    background-image:
      radial-gradient(circle, rgba(255,255,255,0.04) 1px, transparent 1px);
    background-size: 24px 24px;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ===== PAGES ===== */
  .page { display: none; min-height: 100vh; }
  .page.active { display: block; }

  /* ===== GALLERY PAGE ===== */
  #gallery-page {
    padding: 40px 20px 60px;
  }

  .site-header {
    text-align: center;
    margin-bottom: 50px;
  }

  .site-header h1 {
    font-family: 'Bangers', cursive;
    font-size: clamp(3rem, 10vw, 7rem);
    color: var(--yellow);
    letter-spacing: 4px;
    text-shadow:
      4px 4px 0 var(--red),
      8px 8px 0 var(--ink);
    line-height: 1;
    -webkit-text-stroke: 2px var(--ink);
  }

  .site-header .tagline {
    font-family: 'Comic Neue', cursive;
    font-size: 1.1rem;
    color: var(--paper);
    margin-top: 10px;
    opacity: 0.8;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .zigzag-divider {
    width: 100%;
    max-width: 600px;
    margin: 20px auto;
    height: 20px;
    background:
      linear-gradient(135deg, var(--yellow) 25%, transparent 25%) -10px 0,
      linear-gradient(225deg, var(--yellow) 25%, transparent 25%) -10px 0,
      linear-gradient(315deg, var(--yellow) 25%, transparent 25%),
      linear-gradient(45deg, var(--yellow) 25%, transparent 25%);
    background-size: 20px 20px;
    background-color: transparent;
  }

  .comics-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 30px;
    justify-content: center;
    max-width: 1100px;
    margin: 0 auto;
  }

  .comic-card {
    background: var(--paper);
    border: 4px solid var(--ink);
    border-radius: 8px;
    width: 240px;
    cursor: pointer;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
    box-shadow: var(--shadow);
    position: relative;
    overflow: hidden;
  }

  .comic-card:hover {
    transform: translate(-4px, -4px);
    box-shadow: 8px 8px 0px var(--ink);
  }

  .comic-card:active {
    transform: translate(0,0);
    box-shadow: var(--shadow);
  }

  .comic-card .card-cover {
    width: 100%;
    height: 300px;
    background: var(--panel-bg);
    border-bottom: 4px solid var(--ink);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }

  /* Cover art for One Fish */
  .cover-onefish {
    background: linear-gradient(160deg, #a8d8ea 0%, #e8f4f8 60%, #c9e9f6 100%);
  }

  .card-info {
    padding: 14px 16px 16px;
  }

  .card-info .comic-title {
    font-family: 'Bangers', cursive;
    font-size: 1.6rem;
    color: var(--ink);
    letter-spacing: 2px;
    line-height: 1.1;
  }

  .card-info .comic-meta {
    font-size: 0.78rem;
    color: #666;
    margin-top: 4px;
  }

  .card-info .read-btn {
    margin-top: 12px;
    display: inline-block;
    background: var(--red);
    color: white;
    font-family: 'Bangers', cursive;
    font-size: 1.1rem;
    letter-spacing: 1px;
    padding: 6px 18px;
    border: 3px solid var(--ink);
    border-radius: 4px;
    box-shadow: 3px 3px 0 var(--ink);
    transition: transform 0.1s, box-shadow 0.1s;
  }

  .comic-card:hover .read-btn {
    transform: translate(-2px,-2px);
    box-shadow: 5px 5px 0 var(--ink);
  }

  .new-badge {
    position: absolute;
    top: 12px;
    right: -28px;
    background: var(--red);
    color: white;
    font-family: 'Bangers', cursive;
    font-size: 0.9rem;
    letter-spacing: 1px;
    padding: 4px 36px;
    transform: rotate(35deg);
    border-top: 2px solid var(--ink);
    border-bottom: 2px solid var(--ink);
  }

  .add-card {
    background: transparent;
    border: 4px dashed rgba(255,215,0,0.4);
    border-radius: 8px;
    width: 240px;
    height: 398px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: rgba(255,215,0,0.4);
    cursor: default;
    gap: 12px;
  }

  .add-card .plus { font-size: 3rem; }
  .add-card span { font-family: 'Bangers', cursive; font-size: 1.2rem; letter-spacing: 1px; }

  /* ===== FLIPBOOK PAGE ===== */
  #flipbook-page {
    min-height: 100vh;
    padding: 30px 20px 60px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .flipbook-header {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 30px;
    width: 100%;
    max-width: 800px;
  }

  .back-btn {
    font-family: 'Bangers', cursive;
    font-size: 1.1rem;
    letter-spacing: 1px;
    background: var(--yellow);
    color: var(--ink);
    border: 3px solid var(--ink);
    border-radius: 4px;
    box-shadow: 3px 3px 0 var(--ink);
    padding: 6px 16px;
    cursor: pointer;
    transition: transform 0.1s, box-shadow 0.1s;
    white-space: nowrap;
  }

  .back-btn:hover {
    transform: translate(-2px,-2px);
    box-shadow: 5px 5px 0 var(--ink);
  }

  .flipbook-title {
    font-family: 'Bangers', cursive;
    font-size: clamp(2rem, 6vw, 3.5rem);
    color: var(--yellow);
    letter-spacing: 3px;
    text-shadow: 3px 3px 0 var(--red), 5px 5px 0 var(--ink);
    -webkit-text-stroke: 1.5px var(--ink);
  }

  /* ===== BOOK CONTAINER ===== */
  .book-container {
    perspective: 1800px;
    width: min(720px, 95vw);
    display: flex;
    justify-content: center;
    margin-bottom: 28px;
  }

  .book {
    width: 100%;
    max-width: 700px;
    position: relative;
    display: flex;
    justify-content: center;
  }

  /* Two-page spread */
  .spread {
    display: flex;
    width: 100%;
    border: 4px solid var(--ink);
    border-radius: 4px 12px 12px 4px;
    box-shadow: 8px 8px 0 var(--ink), 0 20px 60px rgba(0,0,0,0.6);
    overflow: hidden;
    background: var(--paper);
    min-height: 460px;
    position: relative;
  }

  .page-left, .page-right {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }

  .page-left {
    border-right: 3px solid rgba(0,0,0,0.15);
    background: linear-gradient(to right, #e8dfc8 0%, var(--paper) 100%);
  }

  .page-right {
    background: linear-gradient(to left, #e8dfc8 0%, var(--paper) 100%);
  }

  /* Spine shadow */
  .spread::after {
    content: '';
    position: absolute;
    left: 50%;
    top: 0; bottom: 0;
    width: 10px;
    transform: translateX(-50%);
    background: linear-gradient(to right,
      rgba(0,0,0,0.12),
      rgba(0,0,0,0.05) 30%,
      rgba(255,255,255,0.1) 50%,
      rgba(0,0,0,0.05) 70%,
      rgba(0,0,0,0.12));
    pointer-events: none;
    z-index: 10;
  }

  /* Page content panels */
  .comic-page {
    width: 100%;
    height: 100%;
    min-height: 460px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    padding: 16px;
  }

  .panel {
    border: 3px solid var(--ink);
    border-radius: 3px;
    background: var(--panel-bg);
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  .panel svg { width: 100%; height: 100%; }

  .panel-caption {
    position: absolute;
    bottom: 6px;
    left: 6px;
    right: 6px;
    background: white;
    border: 2px solid var(--ink);
    border-radius: 3px;
    font-family: 'Comic Neue', cursive;
    font-size: clamp(0.62rem, 1.5vw, 0.78rem);
    font-weight: 700;
    padding: 3px 6px;
    text-align: center;
    line-height: 1.3;
  }

  .speech-bubble {
    position: absolute;
    background: white;
    border: 2.5px solid var(--ink);
    border-radius: 16px;
    padding: 5px 10px;
    font-family: 'Comic Neue', cursive;
    font-size: clamp(0.55rem, 1.3vw, 0.72rem);
    font-weight: 700;
    max-width: 55%;
    text-align: center;
    line-height: 1.3;
    z-index: 2;
  }

  .speech-bubble::after {
    content: '';
    position: absolute;
    bottom: -12px;
    left: 50%;
    transform: translateX(-50%);
    border: 6px solid transparent;
    border-top-color: var(--ink);
  }
  .speech-bubble::before {
    content: '';
    position: absolute;
    bottom: -8px;
    left: 50%;
    transform: translateX(-50%);
    border: 5px solid transparent;
    border-top-color: white;
    z-index: 1;
  }

  .page-number {
    position: absolute;
    bottom: 6px;
    font-family: 'Bangers', cursive;
    font-size: 0.85rem;
    color: var(--ink);
    opacity: 0.5;
    letter-spacing: 1px;
  }
  .page-left .page-number { left: 10px; }
  .page-right .page-number { right: 10px; }

  /* Cover styles */
  .cover-panel {
    background: linear-gradient(160deg, #a8d8ea 0%, #e8f4f8 60%, #b5e0f5 100%);
    border: none;
    flex: 1;
  }

  /* Flip animation */
  .spread.flip-left {
    animation: flipLeft 0.5s ease-in-out;
  }
  .spread.flip-right {
    animation: flipRight 0.5s ease-in-out;
  }

  @keyframes flipLeft {
    0% { transform: rotateY(0deg); }
    50% { transform: rotateY(-10deg); opacity: 0.7; }
    100% { transform: rotateY(0deg); }
  }
  @keyframes flipRight {
    0% { transform: rotateY(0deg); }
    50% { transform: rotateY(10deg); opacity: 0.7; }
    100% { transform: rotateY(0deg); }
  }

  /* ===== CONTROLS ===== */
  .controls {
    display: flex;
    align-items: center;
    gap: 20px;
    margin-top: 10px;
  }

  .ctrl-btn {
    font-family: 'Bangers', cursive;
    font-size: 1.3rem;
    letter-spacing: 1px;
    background: var(--yellow);
    color: var(--ink);
    border: 3px solid var(--ink);
    border-radius: 6px;
    box-shadow: 3px 3px 0 var(--ink);
    padding: 8px 22px;
    cursor: pointer;
    transition: transform 0.1s, box-shadow 0.1s, opacity 0.2s;
    user-select: none;
  }

  .ctrl-btn:hover:not(:disabled) {
    transform: translate(-2px,-2px);
    box-shadow: 5px 5px 0 var(--ink);
  }

  .ctrl-btn:active:not(:disabled) {
    transform: translate(1px,1px);
    box-shadow: 2px 2px 0 var(--ink);
  }

  .ctrl-btn:disabled {
    opacity: 0.35;
    cursor: default;
    box-shadow: 2px 2px 0 var(--ink);
  }

  .page-indicator {
    font-family: 'Bangers', cursive;
    font-size: 1.2rem;
    color: var(--paper);
    letter-spacing: 2px;
    min-width: 110px;
    text-align: center;
  }

  .keyboard-hint {
    color: rgba(255,255,255,0.35);
    font-size: 0.72rem;
    margin-top: 10px;
    letter-spacing: 1px;
  }

  @media (max-width: 520px) {
    .spread { min-height: 320px; }
    .comic-page { padding: 8px; gap: 5px; }
    .ctrl-btn { padding: 7px 14px; font-size: 1.1rem; }
  }
</style>
</head>
<body>

<!-- ===== GALLERY PAGE ===== -->
<div id="gallery-page" class="page active">
  <header class="site-header">
    <h1>RONINCOMICS</h1>
    <p class="tagline">Your Comics, Brought to Life</p>
    <div class="zigzag-divider"></div>
  </header>

  <div class="comics-grid">

    <!-- ONE FISH card -->
    <div class="comic-card" onclick="openComic('onefish')">
      <div class="card-cover cover-onefish">
        <span class="new-badge">NEW!</span>
        <img src="comics/Cover.png" alt="One Fish - Cover"
          style="width:100%;height:100%;object-fit:cover;display:block;">
      </div>
      <div class="card-info">
        <div class="comic-title">One Fish</div>
        <div class="comic-meta">6 pages · Adventure · All Ages</div>
        <div class="read-btn">READ NOW ▶</div>
      </div>
    </div>

    <!-- Placeholder future comic -->
    <div class="add-card">
      <div class="plus">＋</div>
      <span>More Comics<br>Coming Soon</span>
    </div>

  </div>
</div>

<!-- ===== FLIPBOOK PAGE ===== -->
<div id="flipbook-page" class="page">
  <div class="flipbook-header">
    <button class="back-btn" onclick="goBack()">← BACK</button>
    <div class="flipbook-title" id="flipbook-title">ONE FISH</div>
  </div>

  <div class="book-container">
    <div class="book">
      <div class="spread" id="spread">
        <div class="page-left" id="page-left"></div>
        <div class="page-right" id="page-right"></div>
      </div>
    </div>
  </div>

  <div class="controls">
    <button class="ctrl-btn" id="prev-btn" onclick="prevPage()" disabled>◀ PREV</button>
    <div class="page-indicator" id="page-indicator">COVER</div>
    <button class="ctrl-btn" id="next-btn" onclick="nextPage()">NEXT ▶</button>
  </div>
  <div class="keyboard-hint">← → arrow keys or swipe to flip</div>
</div>

<script>
// ===== COMIC DATA: One Fish =====
// Each spread has a left page and right page. Index 0 = cover spread.
const oneFishPages = [
  // 0: Cover + page1
  {
    left: 'cover',
    right: 'page1',
  },
  // 1: Pages 2–3
  {
    left: 'page2',
    right: 'page3',
  },
  // 2: Pages 4–5
  {
    left: 'page4',
    right: 'page5',
  },
  // 3: Back cover
  {
    left: 'back-cover',
    right: 'back-cover-blank',
  },
];

let currentSpread = 0;
const totalSpreads = oneFishPages.length;

// ===== PAGE RENDERERS =====
function renderPage(type, container) {
  container.innerHTML = '';

  const renderers = {
    'cover': renderCover,
    'page1': renderPage1,
    'page2': renderPage2,
    'page3': renderPage3,
    'page4': renderPage4,
    'page5': renderPage5,
    'back-cover': renderBackCover,
    'back-cover-blank': renderBlank,
  };

  if (renderers[type]) renderers[type](container);
}

// Generic full-bleed image page, used for every page image (Cover, page1-5)
function renderImagePage(c, src, alt, pageNum, numSide) {
  const page = document.createElement('div');
  page.className = 'comic-page';
  page.style.padding = '8px';

  const p = document.createElement('div');
  p.className = 'panel';
  p.style.flex = '1';
  p.innerHTML = `
    <img src="${src}" alt="${alt}"
      style="width:100%;height:100%;object-fit:contain;display:block;background:#fff8e7;">
  `;
  page.appendChild(p);

  if (pageNum) {
    const pn = document.createElement('div');
    pn.className = 'page-number';
    pn.style[numSide] = '10px';
    pn.textContent = pageNum;
    page.appendChild(pn);
  }

  c.appendChild(page);
}

// -- COVER --
function renderCover(c) {
  c.style.background = '#1a1a2e';
  c.innerHTML = `
    <img src="comics/Cover.png" alt="One Fish - Cover"
      style="width:100%;height:100%;object-fit:cover;display:block;">
  `;
}

// -- PAGE 1 --
function renderPage1(c) {
  renderImagePage(c, 'comics/page1.png', 'One Fish - Page 1', '1', 'right');
}


// -- PAGE 2 --
function renderPage2(c) {
  renderImagePage(c, 'comics/page2.png', 'One Fish - Page 2', '2', 'left');
}

// -- PAGE 3 --
function renderPage3(c) {
  renderImagePage(c, 'comics/page3.png', 'One Fish - Page 3', '3', 'right');
}

// -- PAGE 4 --
function renderPage4(c) {
  renderImagePage(c, 'comics/page4.png', 'One Fish - Page 4', '4', 'left');
}

// -- PAGE 5 --
function renderPage5(c) {
  renderImagePage(c, 'comics/page5.png', 'One Fish - Page 5', '5', 'right');
}

// -- BACK COVER --
function renderBackCover(c) {
  c.style.background = '#1a1a2e';
  c.innerHTML = `
    <svg viewBox="0 0 320 460" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:100%">
      <rect width="320" height="460" fill="#1a1a2e"/>
      <pattern id="dots" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
        <circle cx="10" cy="10" r="1.5" fill="rgba(255,255,255,0.07)"/>
      </pattern>
      <rect width="320" height="460" fill="url(#dots)"/>
      <ellipse cx="160" cy="180" rx="50" ry="35" fill="rgba(255,255,255,0.06)"/>
      <polygon points="205,180 225,165 225,195" fill="rgba(255,255,255,0.06)"/>

      <text x="160" y="100" text-anchor="middle" font-family="Bangers,cursive" font-size="22"
        fill="#FFD700" letter-spacing="3">RONINCOMICS</text>

      <rect x="40" y="250" width="240" height="100" fill="rgba(255,255,255,0.05)" rx="6" stroke="rgba(255,215,0,0.3)" stroke-width="1.5"/>
      <text x="160" y="278" text-anchor="middle" font-family="Bangers,cursive" font-size="15"
        fill="rgba(255,255,255,0.5)" letter-spacing="2">COMING NEXT...</text>
      <text x="160" y="308" text-anchor="middle" font-family="Bangers,cursive" font-size="20"
        fill="#FFD700" letter-spacing="2">TWO FISH</text>
      <text x="160" y="334" text-anchor="middle" font-family="Comic Neue,cursive" font-size="12"
        fill="rgba(255,255,255,0.4)">The adventure continues!</text>

      <text x="160" y="430" text-anchor="middle" font-family="Comic Neue,cursive" font-size="11"
        fill="rgba(255,255,255,0.3)" letter-spacing="1">© 2dstroy · Ronin Network</text>
    </svg>
  `;
}

// -- BLANK (right side of final spread) --
function renderBlank(c) {
  c.style.background = '#1a1a2e';
}

// ===== NAVIGATION =====
function openComic(id) {
  currentSpread = 0;
  document.getElementById('gallery-page').classList.remove('active');
  document.getElementById('flipbook-page').classList.add('active');
  renderSpread();
  updateControls();
}

function goBack() {
  document.getElementById('flipbook-page').classList.remove('active');
  document.getElementById('gallery-page').classList.add('active');
}

function renderSpread(direction) {
  const spread = document.getElementById('spread');
  const leftEl = document.getElementById('page-left');
  const rightEl = document.getElementById('page-right');

  // Animate
  if (direction) {
    spread.classList.remove('flip-left','flip-right');
    void spread.offsetWidth;
    spread.classList.add(direction === 'next' ? 'flip-right' : 'flip-left');
    setTimeout(() => spread.classList.remove('flip-left','flip-right'), 500);
  }

  leftEl.innerHTML = '';
  rightEl.innerHTML = '';
  leftEl.style.background = '';
  rightEl.style.background = '';

  const data = oneFishPages[currentSpread];
  renderPage(data.left, leftEl);
  renderPage(data.right, rightEl);
}

function nextPage() {
  if (currentSpread < totalSpreads - 1) {
    currentSpread++;
    renderSpread('next');
    updateControls();
  }
}

function prevPage() {
  if (currentSpread > 0) {
    currentSpread--;
    renderSpread('prev');
    updateControls();
  }
}

function updateControls() {
  document.getElementById('prev-btn').disabled = currentSpread === 0;
  document.getElementById('next-btn').disabled = currentSpread === totalSpreads - 1;

  const labels = ['COVER', 'PP. 2–3', 'PP. 4–5', 'THE END'];
  document.getElementById('page-indicator').textContent = labels[currentSpread] || `SPREAD ${currentSpread+1}`;
}

// Keyboard nav
document.addEventListener('keydown', (e) => {
  if (!document.getElementById('flipbook-page').classList.contains('active')) return;
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') nextPage();
  if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') prevPage();
});

// Touch/swipe
let touchStartX = 0;
document.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; }, {passive:true});
document.addEventListener('touchend', e => {
  if (!document.getElementById('flipbook-page').classList.contains('active')) return;
  const dx = e.changedTouches[0].clientX - touchStartX;
  if (Math.abs(dx) > 50) dx < 0 ? nextPage() : prevPage();
}, {passive:true});
</script>
</body>
</html>
