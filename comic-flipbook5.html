<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>ARRIVAL AT THE DARK CASTLE - RoninComics</title>

<link rel="preload" as="image" href="comics5/Cover5.png">
<link rel="preload" as="image" href="comics5/page1.png">

<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Comic+Neue:wght@400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ink: #1a1a2e;
    --yellow: #FFD700;
    --red: #E63946;
    --paper: #FFF8E7;
    --panel-bg: #F0E6CC;
  }

  body {
    font-family: 'Comic Neue', cursive;
    background-color: var(--ink);
    background-image: radial-gradient(circle, rgba(255,255,255,0.04) 1px, transparent 1px);
    background-size: 24px 24px;
    min-height: 100vh;
  }

  #flipbook-page {
    min-height: 100vh;
    padding: 20px 12px 40px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .flipbook-header {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 20px;
    width: 100%;
    max-width: 1000px;
  }

  .back-btn {
    font-family: 'Bangers', cursive;
    font-size: 1.1rem;
    letter-spacing: 1px;
    background: var(--yellow);
    color: var(--ink);
    border: 3px solid var(--ink);
    border-radius: 4px;
    box-shadow: 3px 3px 0 var(--ink);
    padding: 6px 16px;
    cursor: pointer;
    text-decoration: none;
    display: inline-block;
    transition: transform 0.1s, box-shadow 0.1s;
    white-space: nowrap;
  }
  .back-btn:hover { transform: translate(-2px,-2px); box-shadow: 5px 5px 0 var(--ink); }

  .flipbook-title {
    font-family: 'Bangers', cursive;
    font-size: clamp(1.4rem, 6vw, 3.5rem);
    color: var(--yellow);
    letter-spacing: 3px;
    text-shadow: 3px 3px 0 var(--red), 5px 5px 0 var(--ink);
    -webkit-text-stroke: 1.5px var(--ink);
  }

  #loading-overlay {
    position: fixed;
    inset: 0;
    background: var(--ink);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    z-index: 999;
    transition: opacity 0.25s ease;
  }
  #loading-overlay.hidden { opacity: 0; pointer-events: none; }
  .spinner {
    width: 44px; height: 44px;
    border: 5px solid rgba(255,215,0,0.25);
    border-top-color: var(--yellow);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #loading-overlay p { font-family: 'Bangers', cursive; color: var(--yellow); letter-spacing: 2px; font-size: 1rem; }

  .book-container {
    perspective: 1800px;
    width: min(1000px, 96vw);
    display: flex;
    justify-content: center;
    margin-bottom: 20px;
  }
  .book { width: 100%; max-width: 980px; position: relative; display: flex; justify-content: center; }

  .spread {
    display: flex;
    width: 100%;
    border: 4px solid var(--ink);
    border-radius: 4px 12px 12px 4px;
    box-shadow: 8px 8px 0 var(--ink), 0 20px 60px rgba(0,0,0,0.6);
    overflow: hidden;
    background: var(--paper);
    height: min(80vh, 780px);
    position: relative;
  }

  .page-left, .page-right {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }
  .page-left { border-right: 3px solid rgba(0,0,0,0.15); background: linear-gradient(to right, #e8dfc8 0%, var(--paper) 100%); }
  .page-right { background: linear-gradient(to left, #e8dfc8 0%, var(--paper) 100%); }

  .spread::after {
    content: '';
    position: absolute;
    left: 50%; top: 0; bottom: 0; width: 10px;
    transform: translateX(-50%);
    background: linear-gradient(to right, rgba(0,0,0,0.12), rgba(0,0,0,0.05) 30%, rgba(255,255,255,0.1) 50%, rgba(0,0,0,0.05) 70%, rgba(0,0,0,0.12));
    pointer-events: none;
    z-index: 10;
  }

  .spread.single-page .page-left { display: none; }
  .spread.single-page::after { display: none; }
  .spread.single-page .page-right { border-right: none; }

  .comic-page { width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; padding: 16px; }

  .panel {
    border: 3px solid var(--ink);
    border-radius: 3px;
    background: var(--panel-bg);
    width: 100%;
    aspect-ratio: 2 / 3;
    max-height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
    margin: auto;
  }

  .page-number {
    position: absolute; bottom: 6px;
    font-family: 'Bangers', cursive;
    font-size: 0.85rem;
    color: var(--ink);
    opacity: 0.5;
    letter-spacing: 1px;
  }
  .page-left .page-number { left: 10px; }
  .page-right .page-number { right: 10px; }

  .spread.flip-left { animation: flipLeft 0.5s ease-in-out; }
  .spread.flip-right { animation: flipRight 0.5s ease-in-out; }
  @keyframes flipLeft { 0% { transform: rotateY(0deg); } 50% { transform: rotateY(-10deg); opacity: 0.7; } 100% { transform: rotateY(0deg); } }
  @keyframes flipRight { 0% { transform: rotateY(0deg); } 50% { transform: rotateY(10deg); opacity: 0.7; } 100% { transform: rotateY(0deg); } }

  .controls { display: flex; align-items: center; gap: 20px; margin-top: 10px; }

  .ctrl-btn {
    font-family: 'Bangers', cursive;
    font-size: 1.3rem;
    letter-spacing: 1px;
    background: var(--yellow);
    color: var(--ink);
    border: 3px solid var(--ink);
    border-radius: 6px;
    box-shadow: 3px 3px 0 var(--ink);
    padding: 8px 22px;
    cursor: pointer;
    transition: transform 0.1s, box-shadow 0.1s, opacity 0.2s;
    user-select: none;
  }
  .ctrl-btn:hover:not(:disabled) { transform: translate(-2px,-2px); box-shadow: 5px 5px 0 var(--ink); }
  .ctrl-btn:active:not(:disabled) { transform: translate(1px,1px); box-shadow: 2px 2px 0 var(--ink); }
  .ctrl-btn:disabled { opacity: 0.35; cursor: default; box-shadow: 2px 2px 0 var(--ink); }

  .page-indicator {
    font-family: 'Bangers', cursive;
    font-size: 1.2rem;
    color: var(--paper);
    letter-spacing: 2px;
    min-width: 110px;
    text-align: center;
  }

  .keyboard-hint { color: rgba(255,255,255,0.35); font-size: 0.72rem; margin-top: 10px; letter-spacing: 1px; text-align: center; }

  /* --- The End / Next-story page --- */
  .end-page {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 22px;
    background: #1a1a2e;
    padding: 24px;
    text-align: center;
  }
  .end-logo {
    font-family: 'Bangers', cursive;
    font-size: clamp(1rem, 4vw, 1.4rem);
    color: var(--yellow);
    letter-spacing: 3px;
  }
  .end-thanks {
    font-family: 'Bangers', cursive;
    font-size: clamp(1.6rem, 6vw, 2.4rem);
    color: #fff;
    letter-spacing: 2px;
    text-shadow: 3px 3px 0 var(--red);
  }
  .next-box {
    background: rgba(255,255,255,0.05);
    border: 1.5px solid rgba(255,215,0,0.3);
    border-radius: 8px;
    padding: 18px 26px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }
  .next-label {
    font-family: 'Bangers', cursive;
    font-size: 0.85rem;
    color: rgba(255,255,255,0.5);
    letter-spacing: 2px;
  }
  .next-title {
    font-family: 'Bangers', cursive;
    font-size: clamp(1.3rem, 5vw, 1.8rem);
    color: var(--yellow);
    letter-spacing: 2px;
  }
  .next-tagline {
    font-family: 'Comic Neue', cursive;
    font-size: 0.8rem;
    color: rgba(255,255,255,0.4);
    margin-bottom: 6px;
  }
  .next-link-btn {
    font-family: 'Bangers', cursive;
    font-size: 1.15rem;
    letter-spacing: 1px;
    background: var(--yellow);
    color: var(--ink);
    border: 3px solid var(--ink);
    border-radius: 6px;
    box-shadow: 3px 3px 0 var(--ink);
    padding: 10px 26px;
    cursor: pointer;
    text-decoration: none;
    display: inline-block;
    transition: transform 0.1s, box-shadow 0.1s;
  }
  .next-link-btn:hover { transform: translate(-2px,-2px); box-shadow: 5px 5px 0 var(--ink); }
  .next-link-btn:active { transform: translate(1px,1px); box-shadow: 2px 2px 0 var(--ink); }
  .end-copyright {
    font-family: 'Comic Neue', cursive;
    font-size: 0.7rem;
    color: rgba(255,255,255,0.3);
  }

  @media (max-width: 700px) {
    .spread { height: min(72vh, 640px); border-radius: 6px; }
    .comic-page { padding: 6px; gap: 4px; }
    .ctrl-btn { padding: 7px 16px; font-size: 1.05rem; }
    .end-page { gap: 14px; padding: 16px; }
  }
</style>
</head>
<body>

<div id="flipbook-page">

  <div id="loading-overlay">
    <div class="spinner"></div>
    <p>LOADING COMIC...</p>
  </div>

  <div class="flipbook-header">
    <a class="back-btn" href="index.html">← BACK</a>
    <div class="flipbook-title" id="flipbook-title">ONE FISH EPISODE 4</div>
  </div>

  <div class="book-container">
    <div class="book">
      <div class="spread" id="spread">
        <div class="page-left" id="page-left"></div>
        <div class="page-right" id="page-right"></div>
      </div>
    </div>
  </div>

  <div class="controls">
    <button class="ctrl-btn" id="prev-btn" onclick="prevPage()" disabled>◀ PREV</button>
    <div class="page-indicator" id="page-indicator">COVER</div>
    <button class="ctrl-btn" id="next-btn" onclick="nextPage()">NEXT ▶</button>
  </div>
  <div class="keyboard-hint">← → arrow keys or swipe to flip</div>
</div>

<script>
const IMAGE_FOLDER = 'comics5';
const COMIC_TITLE = 'ONE FISH EPISODE 5';

// Next issue in the series — update these to change where "THE END" page links.
const NEXT_ISSUE_URL = 'comic-flipbook6.html';
const NEXT_ISSUE_TITLE = 'GASTROGAIA';
const NEXT_ISSUE_TAGLINE = 'The adventure continues!';

const singlePages = [
  { id: 'cover',      type: 'cover',      src: `${IMAGE_FOLDER}/Cover6.png`,           label: 'COVER' },
  { id: 'page1',      type: 'image',      src: `${IMAGE_FOLDER}/page1.png`, num: '1',  label: 'PAGE 1' },
  { id: 'page2',      type: 'image',      src: `${IMAGE_FOLDER}/page2.png`, num: '2',  label: 'PAGE 2' },
  { id: 'page3',      type: 'image',      src: `${IMAGE_FOLDER}/page3.png`, num: '3',  label: 'PAGE 3' },
  { id: 'back-cover', type: 'back-cover',                                              label: 'THE END' },
];

document.getElementById('flipbook-title').textContent = COMIC_TITLE;

const MOBILE_QUERY = window.matchMedia('(max-width: 700px)');
let isMobile = MOBILE_QUERY.matches;

function buildSteps(mobile) {
  if (mobile) return singlePages.map(p => ({ pages: [p] }));
  const steps = [];
  for (let i = 0; i < singlePages.length; i += 2) {
    steps.push({ pages: [singlePages[i], singlePages[i + 1] || null] });
  }
  return steps;
}

let steps = buildSteps(isMobile);
let currentStep = 0;

function renderSinglePage(pageData, container, side) {
  container.innerHTML = '';
  container.style.background = '';
  if (!pageData) { container.style.background = '#1a1a2e'; return; }

  if (pageData.type === 'cover') {
    container.style.background = '#1a1a2e';
    container.innerHTML = `<img src="${pageData.src}" alt="${COMIC_TITLE} - Cover"
      style="width:100%;height:100%;object-fit:cover;object-position:center center;display:block;">`;
    return;
  }

  if (pageData.type === 'back-cover') {
    container.style.background = '#1a1a2e';
    container.innerHTML = `
      <div class="end-page">
        <div class="end-logo">RONINCOMICS</div>
        <div class="end-thanks">THE END</div>
        <div class="next-box">
          <div class="next-label">NEXT...</div>
          <div class="next-title">${NEXT_ISSUE_TITLE}</div>
          <div class="next-tagline">${NEXT_ISSUE_TAGLINE}</div>
          <a class="next-link-btn" href="${NEXT_ISSUE_URL}">CONTINUE READING ▶</a>
        </div>
        <div class="end-copyright">© 2dstroy · Ronin Network</div>
      </div>`;
    return;
  }

  const page = document.createElement('div');
  page.className = 'comic-page';
  const p = document.createElement('div');
  p.className = 'panel';
  p.style.flex = '1';
  p.innerHTML = `<img src="${pageData.src}" alt="${COMIC_TITLE} - Page ${pageData.num || ''}"
    style="width:100%;height:100%;object-fit:cover;object-position:center top;display:block;background:#fff8e7;">`;
  page.appendChild(p);

  if (pageData.num) {
    const pn = document.createElement('div');
    pn.className = 'page-number';
    pn.style[side] = '10px';
    pn.textContent = pageData.num;
    page.appendChild(pn);
  }
  container.appendChild(page);
}

function renderStep(direction) {
  const spread = document.getElementById('spread');
  const leftEl = document.getElementById('page-left');
  const rightEl = document.getElementById('page-right');

  if (direction) {
    spread.classList.remove('flip-left', 'flip-right');
    void spread.offsetWidth;
    spread.classList.add(direction === 'next' ? 'flip-right' : 'flip-left');
    setTimeout(() => spread.classList.remove('flip-left', 'flip-right'), 500);
  }

  spread.classList.toggle('single-page', isMobile);

  const step = steps[currentStep];
  if (isMobile) {
    renderSinglePage(step.pages[0], rightEl, 'right');
  } else {
    renderSinglePage(step.pages[0], leftEl, 'left');
    renderSinglePage(step.pages[1], rightEl, 'right');
  }
}

function nextPage() {
  if (currentStep < steps.length - 1) { currentStep++; renderStep('next'); updateControls(); }
}
function prevPage() {
  if (currentStep > 0) { currentStep--; renderStep('prev'); updateControls(); }
}

function updateControls() {
  document.getElementById('prev-btn').disabled = currentStep === 0;
  document.getElementById('next-btn').disabled = currentStep === steps.length - 1;
  const step = steps[currentStep];
  const label = isMobile
    ? step.pages[0].label
    : (step.pages[0] ? step.pages[0].label : '') + (step.pages[1] ? ' / ' + step.pages[1].label.replace('PAGE ', '') : '');
  document.getElementById('page-indicator').textContent = label;
}

function handleModeChange() {
  const nowMobile = MOBILE_QUERY.matches;
  if (nowMobile === isMobile) return;
  const anchorId = steps[currentStep].pages[0] ? steps[currentStep].pages[0].id : null;
  isMobile = nowMobile;
  steps = buildSteps(isMobile);
  let found = 0;
  steps.forEach((s, i) => { if (s.pages.some(p => p && p.id === anchorId)) found = i; });
  currentStep = found;
  renderStep();
  updateControls();
}
MOBILE_QUERY.addEventListener('change', handleModeChange);

function preloadAndStart() {
  const urls = singlePages.filter(p => p.src).map(p => p.src);
  const overlay = document.getElementById('loading-overlay');
  const reveal = () => overlay.classList.add('hidden');
  if (urls.length === 0) { reveal(); return; }

  const readyThreshold = Math.min(2, urls.length);
  let loaded = 0;
  urls.forEach(src => {
    const img = new Image();
    img.onload = img.onerror = () => { loaded++; if (loaded >= readyThreshold) reveal(); };
    img.src = src;
  });
  setTimeout(reveal, 4000);
}

window.addEventListener('DOMContentLoaded', () => {
  window.scrollTo(0, 0);
  currentStep = 0;
  renderStep();
  updateControls();
  preloadAndStart();
});

document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') nextPage();
  if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') prevPage();
});

let touchStartX = 0;
document.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; }, { passive: true });
document.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  if (Math.abs(dx) > 50) dx < 0 ? nextPage() : prevPage();
}, { passive: true });
</script>
</body>
</html>
