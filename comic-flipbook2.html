<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>RoninComics</title>
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Comic+Neue:wght@400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ink: #1a1a2e;
    --yellow: #FFD700;
    --red: #E63946;
    --paper: #FFF8E7;
    --panel-bg: #F0E6CC;
  }

  body {
    font-family: 'Comic Neue', cursive;
    background: var(--ink);
    min-height: 100vh;
    overflow-x: hidden;
  }

  #flipbook-page {
    min-height: 100vh;
    padding: 15px 10px 30px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }

  .flipbook-header {
    width: 100%;
    max-width: 720px;
    display: flex;
    align-items: center;
    gap: 12px;
    justify-content: center;
    flex-wrap: wrap;
  }

  .back-btn {
    font-family: 'Bangers', cursive;
    font-size: 1.1rem;
    background: var(--yellow);
    color: var(--ink);
    border: 3px solid var(--ink);
    border-radius: 4px;
    padding: 6px 16px;
    box-shadow: 3px 3px 0 var(--ink);
    cursor: pointer;
  }

  .flipbook-title {
    font-family: 'Bangers', cursive;
    font-size: clamp(2.1rem, 7vw, 3.5rem);
    color: var(--yellow);
    letter-spacing: 3px;
    text-shadow: 3px 3px 0 var(--red), 5px 5px 0 var(--ink);
    -webkit-text-stroke: 1.5px var(--ink);
  }

  .book-container {
    perspective: 2000px;
    width: 100%;
    max-width: 720px;
  }

  .spread {
    width: 100%;
    height: 460px;
    border: 4px solid var(--ink);
    border-radius: 8px 16px 16px 8px;
    box-shadow: 8px 8px 0 var(--ink), 0 25px 50px rgba(0,0,0,0.6);
    overflow: hidden;
    background: var(--paper);
    position: relative;
    transition: transform 0.6s cubic-bezier(0.7, 0, 0.3, 1);
    transform-style: preserve-3d;
  }

  /* Realistic Flip Animation */
  .spread.flip-next {
    animation: realisticFlipNext 0.75s cubic-bezier(0.65, 0.05, 0.35, 1) forwards;
  }

  .spread.flip-prev {
    animation: realisticFlipPrev 0.75s cubic-bezier(0.65, 0.05, 0.35, 1) forwards;
  }

  @keyframes realisticFlipNext {
    0% {
      transform: rotateY(0deg) scale(1);
    }
    40% {
      transform: rotateY(-25deg) scale(0.98);
    }
    70% {
      transform: rotateY(8deg) scale(1.02);
    }
    100% {
      transform: rotateY(0deg) scale(1);
    }
  }

  @keyframes realisticFlipPrev {
    0% {
      transform: rotateY(0deg) scale(1);
    }
    40% {
      transform: rotateY(25deg) scale(0.98);
    }
    70% {
      transform: rotateY(-8deg) scale(1.02);
    }
    100% {
      transform: rotateY(0deg) scale(1);
    }
  }

  .page-left, .page-right {
    flex: 1;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }

  .page-left {
    border-right: 4px solid rgba(0,0,0,0.12);
    background: linear-gradient(to right, #e8dfc8 0%, var(--paper) 40%);
  }

  .page-right {
    background: linear-gradient(to left, #e8dfc8 0%, var(--paper) 40%);
  }

  /* Spine shadow */
  .spread::before {
    content: '';
    position: absolute;
    left: 50%;
    top: 0;
    bottom: 0;
    width: 14px;
    background: linear-gradient(to right, rgba(0,0,0,0.25), transparent);
    transform: translateX(-50%);
    z-index: 10;
    pointer-events: none;
  }

  /* Controls */
  .controls {
    width: 100%;
    max-width: 720px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 18px;
    flex-wrap: wrap;
  }

  .ctrl-btn {
    font-family: 'Bangers', cursive;
    font-size: 1.25rem;
    padding: 10px 24px;
    background: var(--yellow);
    color: var(--ink);
    border: 3px solid var(--ink);
    border-radius: 6px;
    box-shadow: 3px 3px 0 var(--ink);
    cursor: pointer;
  }

  .page-indicator {
    font-family: 'Bangers', cursive;
    font-size: 1.2rem;
    color: var(--paper);
    min-width: 130px;
    text-align: center;
  }
</style>
</head>
<body>

<div id="flipbook-page" class="page active">
  <div class="flipbook-header">
    <button class="back-btn" onclick="goBack()">← BACK</button>
    <div class="flipbook-title" id="flipbook-title">ONE FISH</div>
  </div>

  <div class="book-container">
    <div class="book">
      <div class="spread" id="spread">
        <div class="page-left" id="page-left"></div>
        <div class="page-right" id="page-right"></div>
      </div>
    </div>
  </div>

  <div class="controls">
    <button class="ctrl-btn" id="prev-btn" onclick="prevPage()" disabled>◀ PREV</button>
    <div class="page-indicator" id="page-indicator">COVER</div>
    <button class="ctrl-btn" id="next-btn" onclick="nextPage()">NEXT ▶</button>
  </div>
</div>

<script>
// Comic Data
const oneFishPages = [
  { left: 'cover', right: 'page1' },
  { left: 'page2', right: 'page3' },
  { left: 'back-cover', right: 'back-cover-blank' }
];

let currentSpread = 0;
const totalSpreads = oneFishPages.length;

function renderPage(type, container) {
  container.innerHTML = '';
  // Add your render functions here (cover, page1, etc.)
  if (type === 'cover') {
    container.innerHTML = `<img src="comics/Cover.png" style="width:100%; height:100%; object-fit:cover;">`;
  } else if (type === 'page1') {
    container.innerHTML = `<img src="comics/page1.png" style="width:100%; height:100%; object-fit:contain;">`;
  } else if (type === 'page2') {
    container.innerHTML = `<img src="comics/page2.png" style="width:100%; height:100%; object-fit:contain;">`;
  } else if (type === 'page3') {
    container.innerHTML = `<img src="comics/page3.png" style="width:100%; height:100%; object-fit:contain;">`;
  } else if (type === 'back-cover') {
    container.style.background = '#1a1a2e';
    // Add your back cover content here
  } else {
    container.style.background = '#1a1a2e';
  }
}

function renderSpread(direction) {
  const spread = document.getElementById('spread');
  const leftEl = document.getElementById('page-left');
  const rightEl = document.getElementById('page-right');

  // Apply realistic animation
  if (direction) {
    spread.classList.remove('flip-next', 'flip-prev');
    void spread.offsetWidth; // Force reflow
    spread.classList.add(direction === 'next' ? 'flip-next' : 'flip-prev');
  }

  leftEl.innerHTML = '';
  rightEl.innerHTML = '';

  const data = oneFishPages[currentSpread];
  renderPage(data.left, leftEl);
  renderPage(data.right, rightEl);
}

function nextPage() {
  if (currentSpread < totalSpreads - 1) {
    currentSpread++;
    renderSpread('next');
    updateControls();
  }
}

function prevPage() {
  if (currentSpread > 0) {
    currentSpread--;
    renderSpread('prev');
    updateControls();
  }
}

function updateControls() {
  document.getElementById('prev-btn').disabled = currentSpread === 0;
  document.getElementById('next-btn').disabled = currentSpread === totalSpreads - 1;
  
  const labels = ['COVER', 'PP. 2–3', 'THE END'];
  document.getElementById('page-indicator').textContent = labels[currentSpread];
}

function goBack() {
  alert("Going back to gallery...");
}

// Touch Swipe
let touchStartX = 0;
document.addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX;
}, {passive: true});

document.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  if (Math.abs(dx) > 50) {
    dx < 0 ? nextPage() : prevPage();
  }
}, {passive: true});

// Keyboard
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight') nextPage();
  if (e.key === 'ArrowLeft') prevPage();
});

// Initialize
renderSpread();
updateControls();
</script>
</body>
</html>
